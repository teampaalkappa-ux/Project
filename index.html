<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vishu Surprise 🎉</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#f9d423,#ff4e50);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#fff;
}
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:30px;
  text-align:center;
  width:90%;
  max-width:360px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#ff4e50;
  font-weight:bold;
  cursor:pointer;
}
.msg { margin-top:20px; font-size:20px; font-weight:bold; }
.small { margin-top:10px; font-size:14px; opacity:0.9; }
canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style></head><body>
<div class="card">
  <h2>🌼 Vishu Surprise 🌼</h2>
  <button onclick="handleClick()">Vishu Surprise</button>
  <div class="msg" id="msg"></div>
  <div class="small" id="stats"></div>
</div><canvas id="confetti"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 👉 PASTE YOUR FIREBASE CONFIG HERE 👇
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MAX_TOTAL = 150;
const MAX_WINNERS = 5;
const MAX_USER = 5;

const deviceId = localStorage.deviceId || (localStorage.deviceId = Math.random());

async function handleClick() {
  let userClicks = Number(localStorage.clicks || 0);

  if (userClicks >= MAX_USER) {
    msg.innerText = "You used all 5 chances!";
    return;
  }

  const ref = doc(db, "vishu", "global");
  let snap = await getDoc(ref);

  if (!snap.exists()) {
    // Create guaranteed winner slots
    let winningSlots = [];
    while (winningSlots.length < MAX_WINNERS) {
      let num = Math.floor(Math.random() * MAX_TOTAL);
      if (!winningSlots.includes(num)) winningSlots.push(num);
    }

    await setDoc(ref, {
      total: 0,
      winners: [],
      winningSlots
    });

    snap = await getDoc(ref);
  }

  let data = snap.data();

  if (data.total >= MAX_TOTAL) {
    msg.innerText = "All 150 clicks are over!";
    return;
  }

  let currentClick = data.total;
  data.total++;

  let winner = false;

  if (data.winningSlots.includes(currentClick)) {
    if (!data.winners.includes(deviceId)) {
      data.winners.push(deviceId);
      winner = true;
    }
  }

  await updateDoc(ref, data);

  localStorage.clicks = userClicks + 1;

  updateStats(data);

  if (winner) {
    msg.innerText = "🎉 101 Vishu Kainettam 🎉";
    launchConfetti();
  } else {
    msg.innerText = "Happy Vishu 🌼";
  }
}

function updateStats(data) {
  stats.innerText = `Remaining Clicks: ${150 - data.total}`;
}

// 🎉 Confetti
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function launchConfetti() {
  pieces = [];
  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 8 + 2,
      speed: Math.random() * 4 + 2
    });
  }
  animate();
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    p.y += p.speed;
    ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });
  requestAnimationFrame(animate);
}
</script></body>
</html>
